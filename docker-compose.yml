services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - redis
    environment:
      - ADMIN_SECRET=cinema-admin-2024
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_ADDR=redis:6379
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend